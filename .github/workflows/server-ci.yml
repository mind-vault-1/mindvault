name: Server CI

on:
  pull_request:
    paths:
      - "server/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/server-ci.yml"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/server-ci.yml"

jobs:
  server-build:
    name: Server build and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build server
        run: pnpm --filter @mindvault/server build
