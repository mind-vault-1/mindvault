name: Contract CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-contract-wasm-${{ hashFiles('contract/Cargo.toml', 'contract/Cargo.lock', 'contract/contracts/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-contract-wasm-
            ${{ runner.os }}-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build optimized wasm contract
        working-directory: contract
        run: stellar contract build --manifest-path Cargo.toml

      - name: Generate bindings and check freshness
        run: |
          pnpm install --frozen-lockfile
          CONTRACT_WASM=contract/target/wasm32v1-none/release/vault_registry.wasm pnpm contract:bindings
          if ! git diff --quiet packages/registry-client/src/generated; then
            echo "::error::Generated contract bindings are out of date! Please run 'CONTRACT_WASM=contract/target/wasm32v1-none/release/vault_registry.wasm pnpm contract:bindings' locally and commit the changes."
            git diff packages/registry-client/src/generated
            exit 1
          fi

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: vault-registry-wasm
          path: contract/target/wasm32v1-none/release/*.wasm
          if-no-files-found: error

      - name: Run tests
        working-directory: contract
        run: cargo test
